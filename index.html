<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Goobers</title>
<style>
  body {
    background-color: #ffffff;
    color: #000000;
    font-family: "Century Schoolbook", "Century Schoolbook L", Georgia, serif;
    font-style: italic;
    text-align: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 40px;
    box-sizing: border-box;
  }
  img {
    max-width: 300px;
    margin-bottom: 30px;
  }
  p {
    max-width: 700px;
    font-size: 20px;
    line-height: 1.6;
  }
</style>
</head>
<body>
  <img src="your-image.png" alt="The Goobers">
  <p id="typed-text"></p>

  <script>
    const fullText = "The Goobers are a team within the competitive division... Externally competetitve, not internally competitvive. Looking to play with players who won't prevent them from getting in or won't pass them the ball. They are not focused on winning. This season, we're experimenting with formalizing The Goobers as a team explicitly committed to equal playing time, and a non-competitive spirit that prioritizes fun over winning. ";

    const msPerChar = 50;

    const target = document.getElementById("typed-text");
    let i = 0;

    function typeNextChar() {
      if (i < fullText.length) {
        target.textContent += fullText.charAt(i);
        i++;
        setTimeout(typeNextChar, msPerChar);
      }
    }

    typeNextChar();
  </script>
</body>
</html>
